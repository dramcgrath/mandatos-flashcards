<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>¡A practicar con los mandatos!</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f4f0;
    }

    .page {
      display: flex;
      flex-direction: column;
      padding: 0.5rem 0.75rem 1rem;
      max-width: 600px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      flex-shrink: 0;
      margin-bottom: 0.2rem;
    }
    header h1 {
      font-size: clamp(15px, 4.5vw, 22px);
      font-weight: 700;
      color: #26215C;
      letter-spacing: -0.01em;
    }
    header p {
      font-size: clamp(13px, 3.2vw, 15px);
      color: #2C2C2A;
      font-weight: 500;
      margin-top: 3px;
    }

    .tab-row {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-shrink: 0;
      margin-bottom: 0.2rem;
    }
    .tab-btn {
      font-family: inherit;
      font-size: clamp(15px, 4vw, 18px);
      padding: 8px 26px;
      border-radius: 20px;
      cursor: pointer;
      border: 1.5px solid #ccc;
      background: #fff;
      color: #444;
      font-weight: 600;
      transition: background 0.15s, border-color 0.15s;
    }
    .tab-btn.active { background: #26215C; border-color: #26215C; color: #fff; }

    .deck { display: none; flex-direction: column; }
    .deck.active { display: flex; }

    .deck-title {
      text-align: center;
      font-size: clamp(13px, 3.5vw, 16px);
      font-weight: 500;
      color: #2C2C2A;
      flex-shrink: 0;
      margin-bottom: 0.25rem;
    }

    .mode-row {
      display: flex;
      gap: 5px;
      justify-content: center;
      flex-wrap: wrap;
      flex-shrink: 0;
      margin-bottom: 0.25rem;
    }
    .mode-btn {
      font-family: inherit;
      font-size: clamp(11px, 2.6vw, 13px);
      padding: 4px 12px;
      border-radius: 16px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: #fff;
      color: #444;
      font-weight: 700;
    }
    .mode-btn.active { background: #EEEDFE; border-color: #534AB7; color: #3C3489; }

    .counter {
      text-align: center;
      font-size: clamp(13px, 3vw, 15px);
      color: #2C2C2A;
      font-weight: 600;
      flex-shrink: 0;
      margin-bottom: 0.2rem;
    }

    .progress-bar-bg {
      height: 4px; border-radius: 2px;
      background: #D3D1C7;
      flex-shrink: 0;
      margin-bottom: 0.3rem;
    }
    .progress-bar-fill {
      height: 4px; border-radius: 2px;
      transition: width 0.35s;
      background: #534AB7;
    }

    .card-area {
      width: 100%;
      max-width: 560px;
      margin: 0 auto 0.2rem;
      perspective: 1000px;
      cursor: pointer;
      position: relative;
    }
    .card-inner {
      width: 100%;
      transition: transform 0.5s cubic-bezier(.4,0,.2,1);
      transform-style: preserve-3d;
      position: relative;
    }
    .card-inner.flipped { transform: rotateY(180deg); }

    .card-face {
      width: 100%;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.6rem 1rem;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      user-select: none;
      text-align: center;
    }
    .card-back {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      transform: rotateY(180deg);
    }

    .card-type-badge {
      font-size: clamp(10px, 2.4vw, 13px);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
      opacity: 0.65;
    }
    .card-verb {
      font-size: clamp(18px, 5vw, 30px);
      font-weight: 500;
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .card-prompt {
      font-size: clamp(18px, 5vw, 30px);
      font-weight: 500;
      line-height: 1.2;
    }
    .card-answer {
      font-size: clamp(18px, 5vw, 30px);
      font-weight: 500;
      line-height: 1.2;
      padding: 0 0.5rem;
    }

    .tap-hint {
      font-size: clamp(13px, 3vw, 15px);
      color: #2C2C2A;
      font-weight: 500;
      text-align: center;
      flex-shrink: 0;
      margin-bottom: 0.2rem;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-shrink: 0;
      flex-wrap: wrap;
      margin-bottom: 0.2rem;
    }
    .action-btn {
      font-family: inherit;
      font-size: clamp(13px, 3vw, 15px);
      padding: 8px 20px;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: #fff;
      color: #333;
      transition: background 0.15s;
    }
    .action-btn:hover { background: #f0eeee; }
    .btn-know { border-color: #0F6E56; color: #0F6E56; }
    .btn-know:hover { background: #E1F5EE; }
    .btn-again { border-color: #993C1D; color: #993C1D; }
    .btn-again:hover { background: #FAECE7; }

    .done-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem 1rem;
    }
    .done-msg .big {
      font-size: clamp(20px, 5vw, 24px);
      font-weight: 600;
      color: #26215C;
      margin-bottom: 0.3rem;
    }
    .done-msg .sub {
      font-size: clamp(13px, 3vw, 15px);
      color: #5F5E5A;
      margin-bottom: 1rem;
    }
    .done-btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  </style>
</head>

<div class="page">

  <header>
    <h1>¡A practicar con los mandatos!</h1>
    <p>Choose the type of commands you'd like to practice, then tap the card to reveal the correct answer.</p>
  </header>

  <div class="tab-row">
    <button class="tab-btn active" onclick="switchDeck(event,'tu')">Tú</button>
    <button class="tab-btn" onclick="switchDeck(event,'ud')">Ud. / Uds.</button>
  </div>

  <!-- TÚ DECK -->
  <div class="deck active" id="deck-tu">
    <div class="deck-title">Mandatos — Tú</div>
    <div class="mode-row" id="modeRow-tu"></div>
    <div class="counter" id="counter-tu"></div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progBar-tu" style="width:0%"></div></div>
    <div class="card-area" id="cardArea-tu" onclick="flipCard('tu')">
      <div class="card-inner" id="cardInner-tu">
        <div class="card-face" id="frontFace-tu">
          <div class="card-type-badge" id="frontBadge-tu"></div>
          <div class="card-verb" id="frontVerb-tu"></div>
          <div class="card-prompt" id="frontPrompt-tu"></div>
        </div>
        <div class="card-face card-back" id="backFace-tu">
          <div class="card-answer" id="backAnswer-tu"></div>
        </div>
      </div>
    </div>
    <p class="tap-hint" id="tapHint-tu">Tap card to reveal answer</p>
    <div class="btn-row" id="btnRow-tu" style="display:none">
      <button class="action-btn btn-again" onclick="markCard('tu',false)">Return to deck</button>
      <button class="action-btn btn-know" onclick="markCard('tu',true)">Remove from deck</button>
    </div>
    <div class="done-msg" id="doneMsg-tu" style="display:none">
      <div class="big">¡Excelente!</div>
      <div class="sub" id="doneStats-tu"></div>
      <div class="done-btns">
        <button class="action-btn" onclick="restart('tu')">Start over</button>
        <button class="action-btn" id="missedBtn-tu" onclick="studyMissed('tu')">Study missed</button>
      </div>
    </div>
  </div>

  <!-- UD./UDS. DECK -->
  <div class="deck" id="deck-ud">
    <div class="deck-title">Mandatos — Ud. / Uds.</div>
    <div class="mode-row" id="modeRow-ud"></div>
    <div class="counter" id="counter-ud"></div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progBar-ud" style="width:0%"></div></div>
    <div class="card-area" id="cardArea-ud" onclick="flipCard('ud')">
      <div class="card-inner" id="cardInner-ud">
        <div class="card-face" id="frontFace-ud">
          <div class="card-type-badge" id="frontBadge-ud"></div>
          <div class="card-verb" id="frontVerb-ud"></div>
          <div class="card-prompt" id="frontPrompt-ud"></div>
        </div>
        <div class="card-face card-back" id="backFace-ud">
          <div class="card-answer" id="backAnswer-ud"></div>
        </div>
      </div>
    </div>
    <p class="tap-hint" id="tapHint-ud">Tap card to reveal answer</p>
    <div class="btn-row" id="btnRow-ud" style="display:none">
      <button class="action-btn btn-again" onclick="markCard('ud',false)">Return to deck</button>
      <button class="action-btn btn-know" onclick="markCard('ud',true)">Remove from deck</button>
    </div>
    <div class="done-msg" id="doneMsg-ud" style="display:none">
      <div class="big">¡Excelente!</div>
      <div class="sub" id="doneStats-ud"></div>
      <div class="done-btns">
        <button class="action-btn" onclick="restart('ud')">Start over</button>
        <button class="action-btn" id="missedBtn-ud" onclick="studyMissed('ud')">Study missed</button>
      </div>
    </div>
  </div>

</div>

<div style="text-align:center; padding: 0.75rem 0 1rem;">

const TU_TYPES=[
  {key:'aff',badge:'Afirmativo — tú',prompt:'Sí, __________.'},
  {key:'neg',badge:'Negativo — tú',prompt:'No, no __________.'},
];
const TU_MODES=['all','afirmativo','negativo'];
const TU_LABELS={all:'All',afirmativo:'Afirmativo',negativo:'Negativo'};

const UD_TYPES=[
  {key:'aff_ud',badge:'Afirmativo — Ud.',prompt:'Sí, __________ Ud.'},
  {key:'aff_uds',badge:'Afirmativo — Uds.',prompt:'Sí, __________ Uds.'},
  {key:'neg_ud',badge:'Negativo — Ud.',prompt:'No, no __________ Ud.'},
  {key:'neg_uds',badge:'Negativo — Uds.',prompt:'No, no __________ Uds.'},
];
const UD_MODES=['all','afirmativo','negativo','ud','uds'];
const UD_LABELS={all:'All',afirmativo:'Afirmativo',negativo:'Negativo',ud:'Ud.',uds:'Uds.'};

const S={
  tu:{mode:'all',deck:[],idx:0,flipped:false,known:0,missed:[]},
  ud:{mode:'all',deck:[],idx:0,flipped:false,known:0,missed:[]},
};

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pal(vi){return PALETTES[vi%PALETTES.length];}

function applyStyle(p,w){
  ['frontFace-','backFace-'].forEach(id=>{
    const el=document.getElementById(id+w);
    el.style.background=p.bg;
    el.style.border='3px solid '+p.border;
    el.style.boxShadow='4px 5px 0px '+p.shadow;
    el.style.color=p.text;
  });
}

function switchDeck(e,w){
  document.querySelectorAll('.deck').forEach(d=>d.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('deck-'+w).classList.add('active');
  e.target.classList.add('active');
}

function buildDeck(w){
  const s=S[w];
  const verbs=w==='tu'?TU_VERBS:UD_VERBS;
  const tf=w==='tu'
    ?{all:[0,1],afirmativo:[0],negativo:[1]}[s.mode]
    :{all:[0,1,2,3],afirmativo:[0,1],negativo:[2,3],ud:[0,2],uds:[1,3]}[s.mode];
  const cards=[];
  verbs.forEach((v,vi)=>tf.forEach(ti=>cards.push({vi,ti})));
  return shuffle(cards);
}

function buildModeRow(w){
  const modes=w==='tu'?TU_MODES:UD_MODES;
  const labels=w==='tu'?TU_LABELS:UD_LABELS;
  const s=S[w];
  document.getElementById('modeRow-'+w).innerHTML=modes.map(m=>
    `<button class="mode-btn${m===s.mode?' active':''}" data-m="${m}" onclick="setMode('${w}','${m}')">${labels[m]}</button>`
  ).join('');
}

function setMode(w,m){
  S[w].mode=m;
  document.querySelectorAll('#modeRow-'+w+' .mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.m===m));
  restart(w);
}

function restart(w){
  const s=S[w];
  s.deck=buildDeck(w);s.idx=0;s.known=0;s.missed=[];
  document.getElementById('doneMsg-'+w).style.display='none';
  document.getElementById('cardArea-'+w).style.display='block';
  document.getElementById('tapHint-'+w).style.display='block';
  document.getElementById('btnRow-'+w).style.display='none';
  showCard(w);
}

function studyMissed(w){
  const s=S[w];
  if(!s.missed.length)return;
  s.deck=shuffle([...s.missed]);s.idx=0;s.known=0;s.missed=[];
  document.getElementById('doneMsg-'+w).style.display='none';
  document.getElementById('cardArea-'+w).style.display='block';
  document.getElementById('tapHint-'+w).style.display='block';
  document.getElementById('btnRow-'+w).style.display='none';
  showCard(w);
}

function showCard(w){
  const s=S[w];
  if(s.idx>=s.deck.length){showDone(w);return;}
  const {vi,ti}=s.deck[s.idx];
  const verb=w==='tu'?TU_VERBS[vi]:UD_VERBS[vi];
  const type=w==='tu'?TU_TYPES[ti]:UD_TYPES[ti];
  const p=pal(vi);
  s.flipped=false;
  document.getElementById('cardInner-'+w).classList.remove('flipped');
  applyStyle(p,w);
  const badge=document.getElementById('frontBadge-'+w);
  badge.textContent=type.badge;badge.style.color=p.sub;
  const verbEl=document.getElementById('frontVerb-'+w);
  verbEl.textContent=verb.hint?verb.v+'  '+verb.hint:verb.v;verbEl.style.color=p.text;
  const promptEl=document.getElementById('frontPrompt-'+w);
  promptEl.textContent=type.prompt;promptEl.style.color=p.text;
  const ansEl=document.getElementById('backAnswer-'+w);
  ansEl.textContent=verb[type.key];ansEl.style.color=p.text;
  document.getElementById('btnRow-'+w).style.display='none';
  document.getElementById('tapHint-'+w).style.display='block';
  const total=s.deck.length;
  document.getElementById('counter-'+w).textContent='Card '+(s.idx+1)+' of '+total;
  document.getElementById('progBar-'+w).style.width=Math.round((s.idx/total)*100)+'%';
}

function flipCard(w){
  const s=S[w];
  if(s.idx>=s.deck.length)return;
  s.flipped=!s.flipped;
  document.getElementById('cardInner-'+w).classList.toggle('flipped',s.flipped);
  if(s.flipped){
    document.getElementById('btnRow-'+w).style.display='flex';
    document.getElementById('tapHint-'+w).style.display='none';
  }
}

function markCard(w,ok){
  const s=S[w];
  if(!ok)s.missed.push(s.deck[s.idx]);else s.known++;
  s.idx++;showCard(w);
}

function showDone(w){
  const s=S[w];
  document.getElementById('cardArea-'+w).style.display='none';
  document.getElementById('tapHint-'+w).style.display='none';
  document.getElementById('btnRow-'+w).style.display='none';
  document.getElementById('counter-'+w).textContent='';
  document.getElementById('progBar-'+w).style.width='100%';
  const dm=document.getElementById('doneMsg-'+w);
  dm.style.display='flex';
  document.getElementById('doneStats-'+w).textContent='You got '+s.known+' of '+s.deck.length+' correct!';
  document.getElementById('missedBtn-'+w).style.display=s.missed.length?'inline-block':'none';
}

buildModeRow('tu');buildModeRow('ud');
restart('tu');restart('ud');

function setRealVh(){
  document.documentElement.style.setProperty('--real-vh', window.innerHeight+'px');
}
setRealVh();
window.addEventListener('resize', setRealVh);
window.addEventListener('orientationchange', function(){ setTimeout(setRealVh, 200); });
</script>
</body>
</html>
